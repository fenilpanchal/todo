services:

  db:
    image: mysql:8.0
    container_name: todo-mysql-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASS}
      MYSQL_DATABASE: todos

    ports:
      - "3306:3306"

    volumes:
      - todo-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - todo-network-1

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db"]
      interval: 20s
      timeout: 10s
      retries: 5

  backend:
    image: 123fenil/todo-app-backend:$IMAGE_TAG
      # build: ./backend
    container_name: todo-backend-1
    restart: always
   
    ports:
      - "${BACKEND_PORT}:5000"


    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    depends_on:
      db:
        condition: service_healthy

    networks:
      - todo-network-2

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://20.20.2.72:5000/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  frontend:
    image: 123fenil/todo-app-frontend:$IMAGE_TAG
      # build: ./frontend
    container_name: todo-frontend-1
    restart: always

    ports:
      - "${FRONTEND_PORT}:80"

    depends_on:
      - backend

    networks:
      - todo-network-1

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://20.20.2.72:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  todo-db-data:

networks:
  todo-network-1:

