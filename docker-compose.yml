services:

  db:
    image: mysql:8.0
    container_name: todo-mysql-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: todos

    ports:
      - "3306:3306"

    volumes:
      - todo-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - todo-network-1

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db"]
      interval: 20s
      timeout: 10s
      retries: 5

  backend:
    image: 123fenil/todo-app-backend:v2
      # build: ./backend
    container_name: todo-backend-1
    restart: always
   
    ports:
      - "${BACKEND_PORT}:5000"

#    env_file:
#      - .env 

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: todos

    depends_on:
      db:
        condition: service_healthy

    networks:
      - todo-network-1

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://backend/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  frontend:
    image: 123fenil/todo-app-frontend:v2
      # build: ./frontend
    container_name: todo-frontend-1
    restart: always

    ports:
      - "${FRONTEND_PORT}:80"

    depends_on:
      - backend

    networks:
      - todo-network-1

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://frontend"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  todo-db-data:

networks:
  todo-network-1:

